<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Onovis Travel — Эксклюзивные туры и яхты в Бодруме. Скоро открытие." />
  <title>Onovis Travel — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: #040d1a;
      color: #fff;
    }

    /* ── DRONE BG ── */
    .scene { position: fixed; inset: 0; overflow: hidden; }

    .drone-bg {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      background: url('images/drone-bg.png') center center / cover no-repeat;
      animation: droneForward 18s ease-in-out infinite alternate;
      transform-origin: center center;
      will-change: transform, filter;
    }
    @keyframes droneForward {
      0%   { transform: scale(1)    translateY(0);   filter: brightness(0.72) saturate(1.1); }
      100% { transform: scale(1.22) translateY(-3%); filter: brightness(0.58) saturate(1.3); }
    }

    /* side leaf layers */
    .leaves-left, .leaves-right {
      position: absolute; top: 0; bottom: 0; width: 28%;
      pointer-events: none; z-index: 2;
      animation: leavesWay 18s ease-in-out infinite alternate;
    }
    .leaves-left {
      left: -4%;
      background: url('images/drone-bg.png') left center / auto 120% no-repeat;
      -webkit-mask-image: linear-gradient(to right, black 40%, transparent 100%);
      mask-image: linear-gradient(to right, black 40%, transparent 100%);
      filter: brightness(0.45) saturate(0.6);
      animation-direction: alternate-reverse;
    }
    .leaves-right {
      right: -4%;
      background: url('images/drone-bg.png') right center / auto 120% no-repeat;
      -webkit-mask-image: linear-gradient(to left, black 40%, transparent 100%);
      mask-image: linear-gradient(to left, black 40%, transparent 100%);
      filter: brightness(0.45) saturate(0.6);
    }
    @keyframes leavesWay {
      0%   { transform: translateX(0)    translateY(0)    scale(1); }
      100% { transform: translateX(-12px) translateY(-20px) scale(1.08); }
    }

    /* vignette */
    .vignette {
      position: absolute; inset: 0; z-index: 3;
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 25%, rgba(4,13,26,0.7) 100%),
        linear-gradient(180deg,
          rgba(4,13,26,0.6) 0%,
          rgba(4,13,26,0.05) 35%,
          rgba(4,13,26,0.05) 60%,
          rgba(4,13,26,0.8) 100%
        );
    }

    /* ── CONTENT ── */
    .content {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 0;
    }

    /* Logo anchor */
    .logo-mark {
      margin-bottom: 28px;
      opacity: 0;
      animation: riseIn 1s ease 0.3s forwards;
    }
    .logo-mark svg {
      width: 50px; height: 50px;
      filter: drop-shadow(0 0 18px rgba(201,168,76,0.55));
    }

    /* eyebrow */
    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.85);
      margin-bottom: 18px;
      font-weight: 500;
      opacity: 0;
      animation: riseIn 1s ease 0.6s forwards;
    }

    /* main title */
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.2rem, 10vw, 7.5rem);
      font-weight: 300;
      line-height: 1;
      color: #fff;
      margin-bottom: 10px;
      opacity: 0;
      animation: riseIn 1.2s ease 0.8s forwards;
    }
    .main-title em {
      font-style: italic;
      color: rgba(201,168,76,0.95);
    }

    /* subtitle */
    .sub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 2.2vw, 1.35rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 56px;
      opacity: 0;
      animation: riseIn 1s ease 1s forwards;
    }

    /* divider */
    .divider {
      width: 1px; height: 52px;
      background: linear-gradient(180deg, transparent, rgba(201,168,76,0.55), transparent);
      margin: 0 auto 52px;
      opacity: 0;
      animation: riseIn 1s ease 1.1s forwards;
    }

    /* CTA block */
    .cta-block {
      opacity: 0;
      animation: riseIn 1s ease 1.3s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .cta-text {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    .cta-text span {
      display: block;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
      letter-spacing: 0.08em;
    }

    /* WhatsApp button */
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      border-radius: 50px;
      background: linear-gradient(135deg, #25D366, #1aab52);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(37,211,102,0.4);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    .wa-btn svg { width: 22px; height: 22px; }
    .wa-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(37,211,102,0.55);
    }
    .wa-btn:active { transform: scale(0.98); }

    /* ── FOOTER STRIP ── */
    .footer-strip {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
    }
    .footer-domain {
      font-size: 0.7rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25); text-transform: lowercase;
    }
    .lang-switcher {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px; padding: 4px;
    }
    .lang-btn {
      padding: 4px 13px; border-radius: 50px;
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38); cursor: pointer;
      border: none; background: transparent;
      font-family: 'Inter', sans-serif; transition: all 0.25s ease;
    }
    .lang-btn.active { background: rgba(201,168,76,0.85); color: #fff; }

    /* wave bars (top right) */
    .wave-indicator {
      position: fixed; top: 30px; right: 40px; z-index: 20;
      display: flex; gap: 4px; align-items: flex-end;
    }
    .wave-bar {
      width: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.3);
      animation: waveAnim 1.2s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 18px; animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { height: 13px; animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { height: 20px; animation-delay: 0.1s; }
    .wave-bar:nth-child(5) { height: 9px;  animation-delay: 0.25s; }
    @keyframes waveAnim {
      0%, 100% { transform: scaleY(1);   opacity: 0.3; }
      50%       { transform: scaleY(0.3); opacity: 0.1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .footer-strip { padding: 16px 20px; }
      .leaves-left, .leaves-right { display: none; }
      .wave-indicator { right: 20px; }
    }
  </style>
</head>
<body>

<!-- SCENE -->
<div class="scene">
  <div class="drone-bg"></div>
  <div class="leaves-left"></div>
  <div class="leaves-right"></div>
  <div class="vignette"></div>
</div>

<!-- WAVE -->
<div class="wave-indicator">
  <div class="wave-bar"></div><div class="wave-bar"></div>
  <div class="wave-bar"></div><div class="wave-bar"></div>
  <div class="wave-bar"></div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="logo-mark">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" stroke="rgba(201,168,76,0.45)" stroke-width="1"/>
      <path d="M26 14v24M18 18l8-4 8 4M18 34c0 0 2 4 8 4s8-4 8-4"
            stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="26" cy="17" r="2" fill="#c9a84c"/>
    </svg>
  </div>

  <p class="eyebrow" id="eyebrow">Добро пожаловать в</p>

  <h1 class="main-title"><em>Onovis</em> Travel</h1>

  <p class="sub-title" id="subtitle">Бодрум · Турция · Эгейское море</p>

  <div class="divider"></div>

  <div class="cta-block">
    <p class="cta-text" id="cta-text">
      Хотите связаться с нами прямо сейчас?
      <span id="cta-sub">Мы всегда на связи — напишите нам в WhatsApp</span>
    </p>
    <a href="https://wa.me/905434065943" target="_blank" class="wa-btn" id="wa-link">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      <span id="wa-text">Написать в WhatsApp</span>
    </a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer-strip">
  <span class="footer-domain">onovistravel.com</span>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">РУ</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('tr')" id="btn-tr">TR</button>
  </div>
</div>

<script>
  const i18n = {
    ru: { eyebrow: 'Добро пожаловать в', subtitle: 'Бодрум · Турция · Эгейское море',
          cta: 'Хотите связаться с нами прямо сейчас?', ctaSub: 'Мы всегда на связи — напишите нам в WhatsApp', wa: 'Написать в WhatsApp' },
    en: { eyebrow: 'Welcome to', subtitle: 'Bodrum · Turkey · Aegean Sea',
          cta: 'Want to reach us right now?', ctaSub: 'We\'re always available — message us on WhatsApp', wa: 'Message on WhatsApp' },
    tr: { eyebrow: 'Hoş geldiniz', subtitle: 'Bodrum · Türkiye · Ege Denizi',
          cta: 'Bize şu an ulaşmak ister misiniz?', ctaSub: 'Her zaman buradayız — WhatsApp\'tan yazın', wa: 'WhatsApp\'tan Yaz' },
  };

  function setLang(l) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l).classList.add('active');
    const t = i18n[l];
    document.getElementById('eyebrow').textContent  = t.eyebrow;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('cta-text').childNodes[0].textContent = t.cta;
    document.getElementById('cta-sub').textContent  = t.ctaSub;
    document.getElementById('wa-text').textContent  = t.wa;
  }

  // Mouse parallax
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth  - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 14;
    document.querySelector('.drone-bg').style.transform =
      `translate(${-x * 0.28}px, ${-y * 0.28}px) scale(1.06)`;
  });
</script>
</body>
</html>
