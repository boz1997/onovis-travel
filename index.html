<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Onovis Travel — Эксклюзивные туры и яхты в Бодруме. Скоро открытие." />
  <title>Onovis Travel — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    /* ─── DRONE BG ANIMATION ─── */
    body {
      font-family: 'Inter', sans-serif;
      background: #040d1a;
      color: #fff;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* The drone image — simulates flying forward through trees toward sea */
    .drone-bg {
      position: absolute;
      inset: -10%;          /* oversized so zoom doesn't show edges */
      width: 120%;
      height: 120%;
      background: url('images/drone-bg.png') center center / cover no-repeat;
      animation: droneForward 18s ease-in-out infinite alternate;
      transform-origin: center center;
      will-change: transform, filter;
    }

    @keyframes droneForward {
      0% {
        transform: scale(1) translateY(0px);
        filter: brightness(0.75) saturate(1.1);
      }
      40% {
        filter: brightness(0.65) saturate(1.2);
      }
      100% {
        transform: scale(1.22) translateY(-3%);
        filter: brightness(0.6) saturate(1.3);
      }
    }

    /* Tree leaf parallax layers — subtle foreground */
    .leaves-left, .leaves-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 28%;
      pointer-events: none;
      z-index: 2;
      animation: leavesWay 18s ease-in-out infinite alternate;
    }
    .leaves-left {
      left: -4%;
      background: url('images/drone-bg.png') left center / auto 120% no-repeat;
      -webkit-mask-image: linear-gradient(to right, black 40%, transparent 100%);
      mask-image: linear-gradient(to right, black 40%, transparent 100%);
      filter: brightness(0.5) saturate(0.6);
      animation-direction: alternate-reverse;
    }
    .leaves-right {
      right: -4%;
      background: url('images/drone-bg.png') right center / auto 120% no-repeat;
      -webkit-mask-image: linear-gradient(to left, black 40%, transparent 100%);
      mask-image: linear-gradient(to left, black 40%, transparent 100%);
      filter: brightness(0.5) saturate(0.6);
    }
    @keyframes leavesWay {
      0%   { transform: translateX(0) translateY(0) scale(1); }
      100% { transform: translateX(-12px) translateY(-20px) scale(1.08); }
    }

    /* Vignette overlay */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        radial-gradient(ellipse 85% 85% at 50% 50%, transparent 30%, rgba(4,13,26,0.65) 100%),
        linear-gradient(180deg,
          rgba(4,13,26,0.55) 0%,
          rgba(4,13,26,0.1) 30%,
          rgba(4,13,26,0.1) 65%,
          rgba(4,13,26,0.75) 100%
        );
    }

    /* Speed lines — drone motion blur effect */
    .motion-lines {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: radial-gradient(ellipse 50% 50% at 50% 50%,
        transparent 60%,
        rgba(255,255,255,0.015) 80%,
        transparent 100%
      );
      animation: motionPulse 3s ease-in-out infinite;
    }
    @keyframes motionPulse {
      0%, 100% { opacity: 0; }
      50%       { opacity: 1; }
    }

    /* ─── CONTENT ─── */
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 0;
    }

    /* Logo mark */
    .logo-mark {
      margin-bottom: 32px;
      opacity: 0;
      animation: riseIn 1s ease 0.3s forwards;
    }
    .logo-mark svg {
      width: 52px;
      height: 52px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
    }

    /* Eyebrow */
    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.9);
      margin-bottom: 20px;
      font-weight: 500;
      opacity: 0;
      animation: riseIn 1s ease 0.6s forwards;
    }

    /* Main title */
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 8px;
      opacity: 0;
      animation: riseIn 1.2s ease 0.8s forwards;
    }
    .main-title em {
      font-style: italic;
      color: rgba(201,168,76,0.95);
      font-weight: 300;
    }

    /* Sub title */
    .sub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 52px;
      opacity: 0;
      animation: riseIn 1s ease 1s forwards;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(180deg, transparent, rgba(201,168,76,0.6), transparent);
      margin: 0 auto 52px;
      opacity: 0;
      animation: riseIn 1s ease 1.1s forwards;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 36px;
      margin-bottom: 52px;
      opacity: 0;
      animation: riseIn 1s ease 1.3s forwards;
    }
    .count-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .count-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 600;
      line-height: 1;
      color: #fff;
      min-width: 80px;
      text-align: center;
      /* Glass card */
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px 20px 12px;
      transition: all 0.3s ease;
    }
    .count-num:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.3);
    }
    .count-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* Email form */
    .email-section {
      margin-bottom: 40px;
      opacity: 0;
      animation: riseIn 1s ease 1.5s forwards;
    }
    .email-hint {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 16px;
      letter-spacing: 0.08em;
    }
    .email-form {
      display: flex;
      gap: 0;
      border-radius: 50px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.06);
      max-width: 420px;
      margin: 0 auto;
    }
    .email-form input[type="email"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 22px;
      color: #fff;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
    }
    .email-form input::placeholder { color: rgba(255,255,255,0.35); }
    .email-form button {
      background: linear-gradient(135deg, #c9a84c, #a07c2a);
      border: none;
      padding: 14px 26px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease;
      white-space: nowrap;
    }
    .email-form button:hover { background: linear-gradient(135deg, #dabb65, #c9a84c); }
    .email-success {
      display: none;
      font-size: 0.88rem;
      color: rgba(201,168,76,0.9);
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    /* Social / contact */
    .contact-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: riseIn 1s ease 1.7s forwards;
    }
    .contact-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      text-decoration: none;
      color: #fff;
    }
    .contact-pill svg { width: 16px; height: 16px; flex-shrink: 0; }
    .pill-wa { background: rgba(37,211,102,0.15); border-color: rgba(37,211,102,0.3); color: #5df0a0; }
    .pill-wa:hover { background: rgba(37,211,102,0.25); transform: translateY(-2px); }
    .pill-tg { background: rgba(34,158,217,0.15); border-color: rgba(34,158,217,0.3); color: #7dd6f5; }
    .pill-tg:hover { background: rgba(34,158,217,0.25); transform: translateY(-2px); }

    /* Footer lang / brand */
    .footer-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }
    .footer-domain {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      text-transform: lowercase;
    }
    .lang-switcher {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 4px;
    }
    .lang-btn {
      padding: 4px 13px;
      border-radius: 50px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
    }
    .lang-btn.active { background: rgba(201,168,76,0.85); color: #fff; }

    /* Top right — subtle wave indicator */
    .wave-indicator {
      position: fixed;
      top: 32px; right: 40px;
      z-index: 20;
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }
    .wave-bar {
      width: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.35);
      animation: waveAnim 1.2s ease-in-out infinite;
    }
    .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 20px; animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { height: 14px; animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { height: 22px; animation-delay: 0.1s; }
    .wave-bar:nth-child(5) { height: 10px; animation-delay: 0.25s; }
    @keyframes waveAnim {
      0%, 100% { transform: scaleY(1); opacity: 0.35; }
      50%       { transform: scaleY(0.4); opacity: 0.15; }
    }

    /* Entrance animation */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .countdown { gap: 16px; }
      .count-num { min-width: 60px; padding: 12px 14px 10px; }
      .footer-strip { padding: 16px 20px; }
      .email-form { max-width: 100%; }
      .contact-row { flex-wrap: wrap; }
      .leaves-left, .leaves-right { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── SCENE ─── -->
<div class="scene">
  <div class="drone-bg"></div>
  <div class="leaves-left"></div>
  <div class="leaves-right"></div>
  <div class="vignette"></div>
  <div class="motion-lines"></div>
</div>

<!-- ─── WAVE SOUND INDICATOR ─── -->
<div class="wave-indicator">
  <div class="wave-bar"></div>
  <div class="wave-bar"></div>
  <div class="wave-bar"></div>
  <div class="wave-bar"></div>
  <div class="wave-bar"></div>
</div>

<!-- ─── MAIN CONTENT ─── -->
<div class="content">

  <!-- Logo -->
  <div class="logo-mark">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <!-- Anchor -->
      <path d="M26 14v24M18 18l8-4 8 4M18 34c0 0 2 4 8 4s8-4 8-4" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  </div>

  <p class="eyebrow" id="eyebrow">Добро пожаловать в</p>

  <h1 class="main-title">
    <em>Onovis</em> Travel
  </h1>

  <p class="sub-title" id="subtitle">Бодрум · Турция · Эгейское море</p>

  <div class="divider"></div>

  <!-- Countdown -->
  <div class="countdown">
    <div class="count-block">
      <div class="count-num" id="cd-days">00</div>

    <div class="count-block">

    <div class="count-block">
      <div class="count-num" id="cd-min">00</div>

    </div>
    <div class="count-block">
      <div class="count-num" id="cd-sec">00</div>
      <div class="count-label" id="lbl-sec">секунд</div>
    </div>
  </div>

  <!-- Email -->
  <div class="email-section">
    <p class="email-hint" id="email-hint">Узнайте первыми об открытии — получите эксклюзивное предложение</p>
    <form class="email-form" onsubmit="handleEmail(event)">
      <input type="email" id="email-input" placeholder="ваш@email.com" required />
      <button type="submit" id="email-btn">Уведомить</button>
    </form>
    <p class="email-success" id="email-success">✓ Отлично! Мы напишем вам первыми 🌊</p>
  </div>

  <!-- Contacts -->
  <div class="contact-row">
    <a href="https://wa.me/905000000000" target="_blank" class="contact-pill pill-wa">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>

    <a href="https://t.me/onovistravel" target="_blank" class="contact-pill pill-tg">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      Telegram
    </a>
  </div>

</div>

<!-- ─── FOOTER ─── -->
<div class="footer-strip">
  <span class="footer-domain">onovistravel.com</span>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">РУ</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('tr')" id="btn-tr">TR</button>
  </div>
</div>

<script>
  /* ─── LAUNCH DATE — 1 September 2025 ─── */
  const LAUNCH = new Date('2025-09-01T00:00:00+03:00');

  const i18n = {
    ru: {
      eyebrow:    'Добро пожаловать в',
      subtitle:   'Бодрум · Турция · Эгейское море',
      days:       'дней',
      hours:      'часов',
      minutes:    'минут',
      seconds:    'секунд',
      emailHint:  'Узнайте первыми об открытии — получите эксклюзивное предложение',
      emailBtn:   'Уведомить',
      emailPh:    'ваш@email.com',
      emailOk:    '✓ Отлично! Мы напишем вам первыми 🌊',
    },
    en: {
      eyebrow:    'Welcome to',
      subtitle:   'Bodrum · Turkey · Aegean Sea',
      days:       'days',
      hours:      'hours',
      minutes:    'minutes',
      seconds:    'seconds',
      emailHint:  'Be the first to know — get an exclusive launch offer',
      emailBtn:   'Notify Me',
      emailPh:    'your@email.com',
      emailOk:    '✓ Great! We will reach you first 🌊',
    },
    tr: {
      eyebrow:    'Hoş geldiniz',
      subtitle:   'Bodrum · Türkiye · Ege Denizi',
      days:       'gün',
      hours:      'saat',
      minutes:    'dakika',
      seconds:    'saniye',
      emailHint:  'Açılıştan ilk siz haberdar olun — özel teklif kazanın',
      emailBtn:   'Haber Ver',
      emailPh:    'e@posta.com',
      emailOk:    '✓ Harika! Sizi ilk biz arayacağız 🌊',
    }
  };

  let lang = 'ru';

  function setLang(l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l).classList.add('active');
    const t = i18n[l];
    document.getElementById('eyebrow').textContent    = t.eyebrow;
    document.getElementById('subtitle').textContent   = t.subtitle;
    document.getElementById('lbl-days').textContent   = t.days;
    document.getElementById('lbl-hours').textContent  = t.hours;
    document.getElementById('lbl-min').textContent    = t.minutes;
    document.getElementById('lbl-sec').textContent    = t.seconds;
    document.getElementById('email-hint').textContent = t.emailHint;
    document.getElementById('email-btn').textContent  = t.emailBtn;
    document.getElementById('email-input').placeholder = t.emailPh;
    document.getElementById('email-success').textContent = t.emailOk;
  }

  /* ─── COUNTDOWN ─── */
  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = LAUNCH - Date.now();
    if (diff <= 0) {
      document.getElementById('cd-days').textContent  = '00';
      document.getElementById('cd-hours').textContent = '00';
      document.getElementById('cd-min').textContent   = '00';
      document.getElementById('cd-sec').textContent   = '00';
      return;
    }
    const d  = Math.floor(diff / 86400000);
    const h  = Math.floor((diff % 86400000) / 3600000);
    const m  = Math.floor((diff % 3600000)  / 60000);
    const s  = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent  = pad(d);
    document.getElementById('cd-hours').textContent = pad(h);
    document.getElementById('cd-min').textContent   = pad(m);
    document.getElementById('cd-sec').textContent   = pad(s);
  }

  tick();
  setInterval(tick, 1000);

  /* ─── EMAIL FORM ─── */
  function handleEmail(e) {
    e.preventDefault();
    const input   = document.getElementById('email-input');
    const success = document.getElementById('email-success');
    if (!input.value) return;
    input.closest('.email-form').style.display = 'none';
    success.style.display = 'block';
    // Here you'd POST to your backend / Mailchimp / etc.
    console.log('Email captured:', input.value);
  }

  /* ─── MOUSE PARALLAX on bg ─── */
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth  - 0.5) * 18;
    const y = (e.clientY / window.innerHeight - 0.5) * 12;
    document.querySelector('.drone-bg').style.transform =
      `translate(${-x * 0.3}px, ${-y * 0.3}px) scale(1.05)`;
  });
</script>
</body>
